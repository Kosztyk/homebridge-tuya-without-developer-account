name: Release

# This workflow handles latest, beta, and alpha releases:
# - Latest: Triggered by GitHub releases (tag vX.Y.Z)
# - Beta: Triggered by pushes to beta-X.Y.Z branches
# - Alpha: Triggered by pushes to alpha-X.Y.Z branches

# To publish a new plugin version (to the npm 'latest' tag):
# 1. Update the version in package.json and package-lock.json and commit to the 'latest' branch
# 2. Create a new release on GitHub with the tag vX.Y.Z which points to the 'latest' branch
# 3. The release will trigger this workflow, which will publish the new version to npm

# To publish a new plugin version (to the npm 'beta' tag):
# 1. Do not modify any versions in the package.json and package-lock.json
# 2. Instead, create a branch with the name beta-X.Y.Z (e.g. beta-1.0.1, where 1.0.1 is the new version)
# 3. Each commit to the branch will trigger this workflow, which will publish the beta version to npm
#    -> the first commit will publish as v1.0.1-beta.0, the second commit will publish as v1.0.1-beta.1, etc.

# To publish a new plugin version (to the npm 'alpha' tag):
# 1. Do not modify any versions in the package.json and package-lock.json
# 2. Instead, create a branch with the name alpha-X.Y.Z (e.g. alpha-1.0.1, where 1.0.1 is the new version)
# 3. Each commit to the branch will trigger this workflow, which will publish the alpha version to npm
#    -> the first commit will publish as v1.0.1-alpha.0, the second commit will publish as v1.0.1-alpha.1, etc.

on:
  release:
    types: [released]
  push:
    branches:
      - beta-*.*.*
      - alpha-*.*.*
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  determine-release-type:
    name: Determine Release Type
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'homebridge-plugins/homebridge-tuya' }}
    outputs:
      release_type: ${{ steps.release-type.outputs.type }}
      npm_tag: ${{ steps.release-type.outputs.tag }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Determine release type
        id: release-type
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "type=latest" >> $GITHUB_OUTPUT
            echo "tag=latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/beta-* ]]; then
            echo "type=beta" >> $GITHUB_OUTPUT
            echo "tag=beta" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/alpha-* ]]; then
            echo "type=alpha" >> $GITHUB_OUTPUT
            echo "tag=alpha" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
            echo "tag=none" >> $GITHUB_OUTPUT
            echo "No valid release type detected - skipping publish"
          fi

      - name: Get Release Tag (Latest Only)
        if: steps.release-type.outputs.type == 'latest'
        id: get_version
        uses: jannemattila/get-version-from-tag@v3

      - name: Tag Info (Latest Only)
        if: steps.release-type.outputs.type == 'latest'
        run: |
          echo "Release Tag: ${{github.ref}}"
          echo "Latest Tag: ${{ steps.get_version.outputs.version }}"

      - name: Tag Info Matches (Latest Only)
        if: steps.release-type.outputs.type == 'latest' && endsWith(github.ref, steps.get_version.outputs.version)
        run: |
          echo Latest Tag matches Release tag

      - name: Tag Info Doesn't Match (Latest Only)
        if: steps.release-type.outputs.type == 'latest' && !endsWith(github.ref, steps.get_version.outputs.version)
        run: |
          echo Latest Tag does not matches Release tag
          exit 1

  lint:
    needs: determine-release-type
    name: Lint
    if: needs.determine-release-type.outputs.release_type != 'none'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint

  publish:
    needs: [determine-release-type, lint]
    if: |
      always() &&
      needs.determine-release-type.outputs.release_type != 'none' &&
      (needs.determine-release-type.outputs.release_type == 'alpha' || needs.lint.result == 'success')
    name: Publish to npm (${{ needs.determine-release-type.outputs.npm_tag }})
    runs-on: ubuntu-latest
    outputs:
      npm_version: ${{ steps.get-published-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Handle prerelease versioning
        if: needs.determine-release-type.outputs.release_type == 'beta' || needs.determine-release-type.outputs.release_type == 'alpha'
        run: |
          # Download versioning script from homebridge/.github
          mkdir -p .github
          wget -q https://raw.githubusercontent.com/homebridge/.github/latest/.github/npm-version-script-esm.js -O .github/npm-version-script-esm.js

          # Run the script to set base version
          node .github/npm-version-script-esm.js ${{ github.ref }} ${{ needs.determine-release-type.outputs.release_type }}

          # Add prerelease suffix
          npm version pre --preid=${{ needs.determine-release-type.outputs.release_type }} --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Publish to npm with OIDC
        run: npm publish --tag ${{ needs.determine-release-type.outputs.npm_tag }} --provenance --access public

      - name: Get published version
        id: get-published-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"
